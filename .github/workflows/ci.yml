name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref; let branch protection rely on the last one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (esbuild production bundle)
        run: npm run build

      # Cheap insurance: fail fast if .vscodeignore/manifest would ship the
      # wrong files, without paying for a full 6-target package:all.
      - name: Validate packaging config
        run: npx vsce ls >/dev/null
