name: Release

# Full CD: pushing a tag v* builds all 6 per-platform VSIX, publishes them to
# the VS Code Marketplace, and creates a GitHub Release with the VSIX attached.
#
# Safe first-run test: run it manually with "Dry run" enabled — it builds and
# uploads the VSIX as a workflow artifact WITHOUT publishing or cutting a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + package only; skip Marketplace publish and GitHub Release)'
        type: boolean
        default: true

# Never cancel a real tag release mid-flight; a manual re-run must wait its turn.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # GITHUB_TOKEN needs this to create the release + assets.

jobs:
  release:
    name: Package · Publish · Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Builds one VSIX per target on a single runner. package-all.mjs swaps the
      # native node-pty binary per target via `npm install --force`, so no OS
      # matrix is needed.
      - name: Package 6 per-platform VSIX
        run: npm run package:all

      # Fail loudly if packaging silently produced nothing.
      - name: Verify VSIX exist
        run: |
          ls -1 oh-my-pi-vscode-*.vsix
          test "$(ls -1 oh-my-pi-vscode-*.vsix | wc -l)" -eq 6

      # Always upload, so a dry run still yields downloadable VSIX to inspect,
      # and a real run keeps a copy even if a later step fails.
      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-packages
          path: oh-my-pi-vscode-*.vsix
          if-no-files-found: error

      # Publish each pre-built VSIX by path; the target platform is read from the
      # VSIX manifest. --skip-duplicate makes a re-run idempotent if it partially
      # succeeded (re-run the job from the Actions UI to publish what's missing).
      - name: Publish to VS Code Marketplace
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          echo "Publishing $(ls -1 oh-my-pi-vscode-*.vsix | wc -l) VSIX packages…"
          for f in oh-my-pi-vscode-*.vsix; do
            echo "::group::Publishing $f"
            vsce publish -i "$f" --skip-duplicate
            echo "::endgroup::"
          done

      # Extract this version's CHANGELOG section as release notes, then attach the
      # VSIX as release assets. Skipped on manual dispatch (no tag exists).
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"   # v1.0.1 -> 1.0.1
          awk -v v="$VER" '
            /^## \[/ {
              if (capturing) exit
              if (index($0, "[" v "]")) { capturing = 1; print; next }
            }
            capturing { print }
          ' CHANGELOG.md > release-notes.md

          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              oh-my-pi-vscode-*.vsix
          else
            echo "No CHANGELOG section for $VER; falling back to auto-generated notes."
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              oh-my-pi-vscode-*.vsix
          fi
